version: '3.9'

services:
  alice:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: alice
    networks:
      network1:
        ipv4_address: 192.168.1.2
        driver_opts:
          com.docker.network.endpoint.sysctls: "net.ipv4.conf.IFNAME.arp_accept=1"
    volumes:
      - ./scripts:/scripts
    restart: always
    entrypoint: ["/usr/local/bin/net-config/alice-config.sh"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    tty: true

  bob:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: bob
    networks:
      network1:
        ipv4_address: 192.168.1.3
        driver_opts:
          com.docker.network.endpoint.sysctls: "net.ipv4.conf.IFNAME.arp_accept=1"
    volumes:
      - ./scripts:/scripts
    restart: always
    entrypoint: ["/usr/local/bin/net-config/bob-config.sh"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    tty: true

  john:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: john
    networks:
      network2:
        ipv4_address: 192.168.2.2
        driver_opts:
          com.docker.network.endpoint.sysctls: "net.ipv4.conf.IFNAME.arp_accept=1"
    volumes:
      - ./scripts:/scripts
    restart: always
    entrypoint: ["/usr/local/bin/net-config/john-config.sh"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    tty: true

  mx:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: mx
    volumes:
      - ./scripts:/scripts
    networks:
      network4:
        ipv4_address: 192.168.4.2
    restart: always
    entrypoint: ["/usr/local/bin/net-config/mx-config.sh"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    tty: true

  http:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: http
    volumes:
      - ./scripts:/scripts
    networks:
      network4:
        ipv4_address: 192.168.4.3
    restart: always
    entrypoint: ["/usr/local/bin/net-config/http-config.sh"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    tty: true

  ns:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: ns
    volumes:
      - ./scripts:/scripts
    networks:
