    restart: always
    entrypoint: ["/usr/local/bin/net-config/router_e-config.sh"]
    volumes:
      - ./scripts:/scripts
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    tty: true

networks:
  network1:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.254
  network2:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.2.0/24
          gateway: 192.168.2.254
  network3:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.3.0/24
          gateway: 192.168.3.254
  network4:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.4.0/24
          gateway: 192.168.4.254
  network5:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.5.0/27
          gateway: 192.168.5.30
  network6:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.5.32/27
          gateway: 192.168.5.62
  network7:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.5.64/27
          gateway: 192.168.5.94
  network8:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.5.96/27
          gateway: 192.168.5.126
  network9:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.5.128/27
          gateway: 192.168.5.158
