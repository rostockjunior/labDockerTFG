    tty: true

  router_a:
    build:
      context: .
      dockerfile: Dockerfile.router
    container_name: router_a
    volumes:
      - ./scripts:/scripts
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      network1:
        ipv4_address: 192.168.1.1
      network5:
        ipv4_address: 192.168.5.1
    restart: always
    entrypoint: ["/usr/local/bin/net-config/router_a-config.sh"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    tty: true

  router_b:
    build:
      context: .
      dockerfile: Dockerfile.router
    container_name: router_b
    volumes:
      - ./scripts:/scripts
